<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimIQ — Insurance Claim Settlement Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0c0f1a;
  --surface:  #141824;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #e8eaf0;
  --muted:    rgba(232,234,240,0.45);
  --faint:    rgba(232,234,240,0.2);
  --blue:     #3b82f6;
  --blue-d:   #1d4ed8;
  --blue-bg:  rgba(59,130,246,0.1);
  --blue-bdr: rgba(59,130,246,0.25);
  --green:    #10b981;
  --green-bg: rgba(16,185,129,0.1);
  --green-bdr:rgba(16,185,129,0.25);
  --red:      #ef4444;
  --red-bg:   rgba(239,68,68,0.08);
  --red-bdr:  rgba(239,68,68,0.2);
  --amber:    #f59e0b;
  --amber-bg: rgba(245,158,11,0.08);
  --amber-bdr:rgba(245,158,11,0.2);
  --radius:   12px;
  --font:     'DM Sans', sans-serif;
  --mono:     'DM Mono', monospace;
  --serif:    'Fraunces', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── Layout ── */
.app { display: grid; grid-template-rows: 56px 1px 1fr; height: 100vh; overflow: hidden; }
.divider { background: var(--border); }
.body { display: grid; grid-template-columns: 340px 1px 1fr; overflow: hidden; }
.v-divider { background: var(--border); }
.left { overflow-y: auto; display: flex; flex-direction: column; }
.right { overflow-y: auto; }

/* ── Nav ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 30px; height: 30px; border-radius: 8px;
  background: linear-gradient(135deg, var(--blue), var(--blue-d));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif); font-size: 15px; color: #fff; font-weight: 300; font-style: italic;
}
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -.3px; }
.brand-sub  { font-size: 10px; color: var(--faint); margin-top: -1px; }
.nav-pills  { display: flex; gap: 8px; }
.pill {
  font-size: 10px; font-weight: 500; padding: 3px 10px;
  border-radius: 20px; border: 1px solid var(--border2);
  color: var(--muted); background: rgba(255,255,255,0.03);
}
.pill.active { background: var(--blue-bg); border-color: var(--blue-bdr); color: var(--blue); }

/* ── Left Panel ── */
.left-header {
  padding: 20px 20px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.left-header h3 {
  font-size: 11px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--faint); margin-bottom: 4px;
}
.left-header p { font-size: 12px; color: var(--muted); line-height: 1.5; }
.bill-list { padding: 12px; flex: 1; }
.bill-item {
  padding: 14px; border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 8px; cursor: pointer;
  transition: border-color .15s, background .15s;
  background: rgba(255,255,255,0.02);
}
.bill-item:hover { border-color: var(--border2); background: rgba(255,255,255,0.04); }
.bill-item.active { border-color: var(--blue-bdr); background: var(--blue-bg); }
.bill-item.active .bi-id { color: var(--blue); }
.bi-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.bi-name { font-size: 13px; font-weight: 500; color: var(--text); }
.bi-amt  { font-family: var(--mono); font-size: 12px; color: var(--muted); flex-shrink: 0; margin-left: 8px; }
.bi-diag { font-size: 11px; color: var(--muted); margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bi-bottom { display: flex; align-items: center; justify-content: space-between; }
.bi-id { font-family: var(--mono); font-size: 10px; color: var(--faint); }
.badge {
  font-size: 9px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; letter-spacing: .3px; border: 1px solid;
}
.badge-ok  { color: var(--green); background: var(--green-bg); border-color: var(--green-bdr); }
.badge-rej { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bdr);   }
.badge-par { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bdr); }
.bill-item.active .badge-ok  { box-shadow: 0 0 10px rgba(16,185,129,0.2); }
.bill-item.active .badge-rej { box-shadow: 0 0 10px rgba(239,68,68,0.15); }
.bill-item.active .badge-par { box-shadow: 0 0 10px rgba(245,158,11,0.15); }

/* ── Run button ── */
.run-wrap { padding: 12px; flex-shrink: 0; border-top: 1px solid var(--border); }
.run-btn {
  width: 100%; padding: 11px 20px; border-radius: var(--radius);
  border: none; cursor: pointer; font-family: var(--font);
  font-size: 13px; font-weight: 600; letter-spacing: -.1px;
  background: linear-gradient(135deg, var(--blue), var(--blue-d));
  color: #fff; transition: opacity .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.run-btn:hover  { opacity: .9; }
.run-btn:active { transform: scale(.99); }
.run-btn:disabled { opacity: .4; cursor: default; transform: none; }
.run-btn svg { animation: none; }
.run-btn.running svg { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Right panel states ── */
.right-inner { padding: 28px; min-height: 100%; }
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: calc(100vh - 57px);
  text-align: center; gap: 16px;
}
.empty-icon {
  width: 72px; height: 72px; border-radius: 20px;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center; font-size: 30px;
}
.empty-title { font-size: 17px; font-weight: 500; }
.empty-sub { font-size: 13px; color: var(--muted); max-width: 280px; line-height: 1.65; }

/* ── Pipeline ── */
.pipeline {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 24px; overflow-x: auto; padding-bottom: 2px;
}
.pipe-step {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  transition: all .25s; flex-shrink: 0;
}
.pipe-step.idle   { opacity: .25; }
.pipe-step.active { background: var(--blue-bg); border: 1px solid var(--blue-bdr); opacity: 1; }
.pipe-step.done   { background: var(--green-bg); border: 1px solid var(--green-bdr); opacity: 1; }
.pipe-icon { font-size: 14px; }
.pipe-label { font-size: 11px; font-weight: 500; }
.idle   .pipe-label { color: var(--muted); }
.active .pipe-label { color: var(--blue); }
.done   .pipe-label { color: var(--green); }
.pipe-arrow { color: var(--faint); font-size: 12px; padding: 0 4px; flex-shrink: 0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
.pipe-step.active .pipe-icon { animation: blink 1s infinite; }

/* ── Decision header ── */
.decision-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 20px; gap: 16px;
}
.decision-patient { font-size: 20px; font-weight: 500; letter-spacing: -.5px; margin-bottom: 3px; }
.decision-meta    { font-size: 12px; color: var(--muted); }
.verdict-badge {
  font-size: 13px; font-weight: 600; padding: 8px 20px;
  border-radius: 10px; border: 1px solid; flex-shrink: 0; letter-spacing: .2px;
}
.verdict-ok  { color: var(--green); background: var(--green-bg); border-color: var(--green-bdr); }
.verdict-rej { color: var(--red);   background: var(--red-bg);   border-color: var(--red-bdr);   }
.verdict-par { color: var(--amber); background: var(--amber-bg); border-color: var(--amber-bdr); }

/* ── Financials ── */
.fin-row  { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 16px; }
.fin-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.fin-lbl  { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .8px; color: var(--faint); margin-bottom: 6px; }
.fin-val  { font-family: var(--mono); font-size: 1.25rem; font-weight: 500; letter-spacing: -.5px; }
.fin-val.green { color: var(--green); }
.fin-val.red   { color: var(--red); }
.fin-val.blue  { color: var(--blue); }

/* ── Confidence ── */
.conf-strip {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 16px;
}
.conf-lbl   { font-size: 11px; color: var(--muted); min-width: 80px; }
.conf-track { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
.conf-fill  { height: 100%; border-radius: 2px; transition: width .6s cubic-bezier(.4,0,.2,1); }
.conf-pct   { font-family: var(--mono); font-size: 11px; font-weight: 500; min-width: 36px; text-align: right; }
.conf-note  { font-size: 10px; padding: 2px 7px; border-radius: 6px; }
.conf-note.review { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-bdr); }
.conf-note.normal { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-bdr); }

/* ── Block banner ── */
.block-banner {
  display: flex; gap: 12px; padding: 12px 14px;
  background: var(--red-bg); border: 1px solid var(--red-bdr);
  border-radius: var(--radius); margin-bottom: 16px;
}
.block-icon { font-size: 16px; flex-shrink: 0; padding-top: 1px; }
.block-msg  { font-size: 12px; color: #fca5a5; line-height: 1.55; }
.block-cite { font-size: 10px; color: rgba(252,165,165,.55); margin-top: 3px; }

/* ── Section label ── */
.sec-lbl {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--faint); margin-bottom: 10px;
}

/* ── Line items ── */
.li-wrap  { margin-bottom: 20px; }
.li-head  {
  display: grid; grid-template-columns: 1fr 90px 90px 80px;
  gap: 8px; padding: 0 10px 8px;
  border-bottom: 1px solid var(--border); margin-bottom: 2px;
}
.li-head span { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--faint); }
.li-head span:not(:first-child) { text-align: right; }
.li-row {
  display: grid; grid-template-columns: 1fr 90px 90px 80px;
  gap: 8px; padding: 10px; border-radius: 8px;
  border-left: 2px solid transparent; margin-bottom: 1px;
  transition: background .12s;
}
.li-row:hover  { background: rgba(255,255,255,0.025); }
.li-row.ok  { border-left-color: rgba(16,185,129,.4); }
.li-row.rej { border-left-color: rgba(239,68,68,.4); }
.li-row.par { border-left-color: rgba(245,158,11,.4); }
.li-desc   { font-size: 12px; color: var(--text); }
.li-reason { font-size: 10px; color: var(--faint); margin-top: 3px; line-height: 1.45; }
.li-cite   { font-size: 9px; color: rgba(59,130,246,.55); margin-top: 2px; font-style: italic; }
.li-billed  { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; padding-top: 1px; }
.li-appr    { font-family: var(--mono); font-size: 11px; font-weight: 500; text-align: right; padding-top: 1px; }
.li-appr.green { color: var(--green); }
.li-appr.red   { color: var(--red); }
.li-appr.amber { color: var(--amber); }
.li-status { display: flex; justify-content: flex-end; align-items: flex-start; }

/* ── Two-col grid for fraud + citations ── */
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 4px; }

/* ── Fraud ── */
.fraud-card { border-radius: var(--radius); border: 1px solid; padding: 14px; }
.fraud-card.low   { background: var(--green-bg); border-color: var(--green-bdr); }
.fraud-card.medium{ background: var(--amber-bg); border-color: var(--amber-bdr); }
.fraud-card.high  { background: var(--red-bg);   border-color: var(--red-bdr);   }
.fraud-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.fraud-title { font-size: 11px; font-weight: 600; color: var(--muted); }
.fraud-score { font-family: var(--mono); font-size: 12px; font-weight: 500; }
.fraud-card.low   .fraud-score { color: var(--green); }
.fraud-card.medium.fraud-score { color: var(--amber); }
.fraud-card.high  .fraud-score { color: var(--red);   }
.fraud-card.medium .fraud-score { color: var(--amber); }
.fraud-card.high   .fraud-score { color: var(--red); }
.fraud-empty { font-size: 11px; color: var(--faint); }
.sig-row {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 7px 0; border-top: 1px solid rgba(255,255,255,0.06);
  font-size: 11px; color: var(--muted); line-height: 1.4;
}
.sig-tag {
  font-size: 9px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  text-transform: uppercase; letter-spacing: .3px;
}
.sig-tag.high   { background: rgba(239,68,68,.2);    color: var(--red);   }
.sig-tag.medium { background: rgba(245,158,11,.15);  color: var(--amber); }
.sig-tag.low    { background: rgba(16,185,129,.12);  color: var(--green); }

/* ── Citations ── */
.cite-list { }
.cite-item {
  display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px;
  background: var(--blue-bg); border: 1px solid var(--blue-bdr);
  border-radius: 8px; margin-bottom: 6px;
  font-size: 11px; color: rgba(147,197,253,.8); line-height: 1.45;
}
.cite-n {
  background: rgba(59,130,246,.2); color: var(--blue);
  font-size: 9px; font-weight: 700; padding: 2px 6px;
  border-radius: 4px; flex-shrink: 0; margin-top: 1px; font-family: var(--mono);
}

/* ── Timing ── */
.timing { font-size: 10px; color: var(--faint); margin-top: 20px; display: flex; align-items: center; gap: 6px; }
.timing-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }

/* ── Notes ── */
.notes { margin-bottom: 12px; }
.note-item {
  font-size: 11px; color: var(--muted); padding: 8px 12px;
  border-left: 2px solid var(--amber); margin-bottom: 5px;
  background: var(--amber-bg); border-radius: 0 6px 6px 0;
  line-height: 1.5;
}

/* ── Accuracy note ── */
.accuracy-note {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10px; color: var(--muted); padding: 4px 10px;
  border: 1px solid var(--border); border-radius: 20px;
}
</style>
</head>

</div><!-- /body -->
</div><!-- /app -->

    admit:"2024-10-10", discharge:"2024-10-12", preauth:true,
    expected:"REJECTED", total:68300,
    items:[
      {d:"Room – General Ward (2 nights @ ₹2,400)", a:4800,  c:"room_general", days:2},
      {d:"Surgeon Fees – Laparoscopic Hernia Repair",a:35000, c:"49650"},
      {d:"Anesthesiologist Fees",                    a:7000,  c:"00832"},
      {d:"Operation Theatre Charges",                a:10000, c:"facility"},
      {d:"Mesh Implant",                             a:8000,  c:"implant"},
      {d:"Medicines",                                a:3500,  c:"pharmacy"},
    ]},
];

var SECTIONS = {
  "S1.P2": {p:1,  t:"Coverage Overview"},
  "S2.P1": {p:3,  t:"Covered Services"},
  "S2.P2": {p:3,  t:"Benefit Sub-limits"},
  "S3.P2": {p:6,  t:"Exclusions – Cosmetic"},
  "S3.P3": {p:6,  t:"Exclusions – Dental"},
  "S3.P4": {p:6,  t:"Exclusions – Maternity"},
  "S4.P1": {p:9,  t:"Waiting Periods – Initial"},
  "S4.P2": {p:9,  t:"Waiting Periods – Specific"},
  "S5.P1": {p:11, t:"Pre-Authorisation"},
  "S6.P4": {p:13, t:"Benefit Limits – Physio"},
  "S6.P6": {p:13, t:"Benefit Limits – Implants"},
  "S7.P1": {p:15, t:"Co-payment"},
};

function cite(id) {
  var s = SECTIONS[id];
  return s ? "Page "+s.p+", Section "+id.split(".")[0]+" ("+s.t+"), Para "+id : id;
}

function inr(n) {
  return "₹" + Math.abs(Math.round(n)).toLocaleString("en-IN");
}

function classify(item) {
  var d = item.d.toLowerCase(), c = (item.c||"").toLowerCase();
  if (d.includes("room")||d.includes("ward")||d.includes("accommodation")) return "room";
  if (d.includes("icu")||d.includes("intensive care"))                       return "icu";
  if (d.includes("implant")||d.includes("prosthetic")||d.includes("mesh"))  return "implant";
  if (d.includes("physio")||d.includes("therapy session"))                   return "physio";
  if (d.includes("rhinoplasty")||d.includes("cosmetic")||d.includes("nose reshaping")) return "cosmetic";
  return "other";
}

// ─── Rule Engine ────────────────────────────────────────────────────────────
function evaluate(bill) {
  var POLICY = { room_gen:3000, room_prv:6000, icu_day:6000, implant:50000, physio:500, sum:500000 };
  var dx  = bill.name.toLowerCase();
  var all = dx + " " + bill.items.map(function(i){return i.d;}).join(" ").toLowerCase();
  var ms  = (new Date(bill.admit) - new Date(bill.pstart)) / (1000*60*60*24*30.44);

  var blocking=null, bcite=null, cites=[], notes=[];
  function addC(id) { if (cites.indexOf(id)<0) cites.push(id); }

  // Claim-level blocks (priority order)
  if (ms < 1) {
    var days = Math.round((new Date(bill.admit)-new Date(bill.pstart))/(1000*60*60*24));
    blocking = "Claim falls within the 30-day initial waiting period — "+days+" days since policy inception. No hospitalisation benefit is payable.";
    bcite="S4.P1"; addC("S4.P1");
  }
  if (!blocking) {
    var wlist = ["hernia","cataract","hydrocele","varicose","sinusitis","tonsil","piles","gall stone","kidney stone","hysterectomy","bph"];
    for (var w=0;w<wlist.length;w++) {
      if (all.includes(wlist[w])) {
        blocking="'"+bill.name+"' includes a condition subject to the 24-month specific disease waiting period. Policy has been active for only "+ms.toFixed(1)+" months.";
        bcite="S4.P2"; addC("S4.P2"); break;
      }
    }
  }
  var isDental = all.includes("dental")||all.includes("root canal")||
    bill.items.some(function(i){var c=(i.c||"").toUpperCase();return c.length===5&&c[0]==="D"&&!isNaN(c.slice(1));});
  if (!blocking && isDental) {
    blocking="Dental and oral treatment is categorically excluded under this policy.";
    bcite="S3.P3"; addC("S3.P3");
  }
  if (!blocking && (all.includes("pregnancy")||all.includes("maternity")||all.includes("delivery"))) {
    blocking="Maternity-related treatment is excluded under this policy."; bcite="S3.P4"; addC("S3.P4");
  }

  var decisions=[], totalA=0, totalR=0;

  if (blocking) {
    bill.items.forEach(function(item){
      decisions.push({d:item.d,billed:item.a,approved:0,rej:item.a,dec:"REJECTED",reason:blocking,rcite:bcite});
      totalR+=item.a;
    });
  } else {
    if (!bill.preauth && bill.total>50000)
      notes.push("Pre-authorisation was required for claims over ₹50,000 but was not obtained. Insurers may reduce settlement. "+cite("S5.P1"));

    bill.items.forEach(function(item){
      var a=item.a, days=(item.days||1), cat=classify(item);
      var cpt=(item.c||"").toUpperCase();
      var appr=a, rej=0, dec="APPROVED", reason="", rcite="S2.P1";

      // Dental CPT codes
      if (cpt.length===5&&cpt[0]==="D"&&!isNaN(cpt.slice(1))) {
        dec="REJECTED"; appr=0; rej=a;
        reason="Dental CPT code "+cpt+" is excluded under this policy."; rcite="S3.P3";
      }
      // Cosmetic
      else if (cat==="cosmetic") {
        dec="REJECTED"; appr=0; rej=a;
        reason="Cosmetic/aesthetic procedures are excluded under this policy."; rcite="S3.P2";
      }
      // Room rent
      else if (cat==="room") {
        var isPriv=item.d.toLowerCase().includes("private")||item.d.toLowerCase().includes("deluxe")||item.d.toLowerCase().includes("single");
        var cap=(isPriv?POLICY.room_prv:POLICY.room_gen)*days;
        if (a>cap){ dec="PARTIAL"; appr=cap; rej=a-cap;
          reason="Room rent sub-limit: ₹"+(isPriv?POLICY.room_prv:POLICY.room_gen).toLocaleString("en-IN")+"/night × "+days+" nights = "+inr(cap)+". Excess not payable."; rcite="S2.P2"; }
      }
      // ICU
      else if (cat==="icu") {
        var icuCap=POLICY.icu_day*days;
        if (a>icuCap){ dec="PARTIAL"; appr=icuCap; rej=a-icuCap;
          reason="ICU daily limit: ₹"+POLICY.icu_day.toLocaleString("en-IN")+"/day × "+days+" day(s). Excess not payable."; rcite="S2.P2"; }
      }
      // Implant
      else if (cat==="implant") {
        if (a>POLICY.implant){ dec="PARTIAL"; appr=POLICY.implant; rej=a-POLICY.implant;
          reason="Implant/prosthetics sub-limit: "+inr(POLICY.implant)+" per policy year. Amount above cap not payable."; rcite="S6.P6"; }
      }
      // Physiotherapy
      else if (cat==="physio") {
        var phyCap=POLICY.physio*days;
        if (a>phyCap){ dec="PARTIAL"; appr=phyCap; rej=a-phyCap;
          reason="Physiotherapy cap: ₹"+POLICY.physio+"/session × "+days+" sessions = "+inr(phyCap)+". Excess not payable."; rcite="S6.P4"; }
      }

      addC(rcite);
      decisions.push({d:item.d,billed:a,approved:appr,rej:rej,dec:dec,reason:reason,rcite:dec!=="APPROVED"?rcite:""});
      totalA+=appr; totalR+=rej;
    });

    // Co-payment
    var copay=0;
    if (bill.age>=61){ copay=Math.round(totalA*0.10); addC("S7.P1");
      notes.push("10% co-payment applicable (patient aged "+bill.age+"): "+inr(copay)+" deducted. "+cite("S7.P1")); }

    // Sum insured cap
    if (totalA>POLICY.sum){ var excess=totalA-POLICY.sum; totalR+=excess; totalA=POLICY.sum; addC("S1.P2");
      notes.push("Approved amount capped at policy sum insured: "+inr(POLICY.sum)+". Excess "+inr(excess)+" not payable."); }

    var overall = totalA===0?"REJECTED":totalR>0?"PARTIAL":"APPROVED";
    var net = Math.max(0,totalA-copay);

    // Confidence scoring
    var conf=100;
    if (!bill.preauth&&bill.total>50000) conf-=12;
    if (overall==="PARTIAL")            conf-=5;
    var kwRej=decisions.filter(function(d){return d.dec==="REJECTED"&&d.rcite&&d.rcite.startsWith("S3");});
    if (kwRej.length) conf-=Math.min(kwRej.length*8,16);

    return {overall:overall,billed:bill.total,approved:totalA,rejected:totalR,
            copay:copay,net:net,decisions:decisions,cites:cites,notes:notes,
            blocking:null,conf:conf,human:conf<80};
  }

  return {overall:"REJECTED",billed:bill.total,approved:0,rejected:totalR,
          copay:0,net:0,decisions:decisions,cites:cites,notes:notes,
          blocking:blocking,bcite:bcite,conf:100,human:false};
}

// ─── Fraud Analysis ─────────────────────────────────────────────────────────
function fraud(bill, result) {
  var sigs=[];
  var seen={};
  bill.items.forEach(function(item){
    var key=item.d.toLowerCase().replace(/[^a-z]/g,"").substr(0,20);
    if(seen[key]) sigs.push({sev:"high",desc:"Duplicate billing: '"+item.d+"' appears more than once in this claim"});
    else seen[key]=1;
  });
  var benchmarks={"consultation":3000,"x-ray":1500,"mri":15000,"ct scan":8000,"ultrasound":3000};
  bill.items.forEach(function(item){
    for(var k in benchmarks){
      if(item.d.toLowerCase().includes(k)&&item.a>benchmarks[k]*2.5){
        sigs.push({sev:"high",desc:"Amount outlier: '"+item.d+"' ("+inr(item.a)+") is "+Math.round(item.a/benchmarks[k])+"× the expected maximum of "+inr(benchmarks[k])});
        break;
      }
    }
  });
  var score=Math.min(100,sigs.reduce(function(s,sg){return s+(sg.sev==="high"?35:20);},0));
  var level=score>=70?"HIGH":score>=40?"MEDIUM":"LOW";
  return {level:level,score:score,signals:sigs};
}

// ─── UI Helpers ─────────────────────────────────────────────────────────────
function badgeClass(e){ return e==="APPROVED"?"badge-ok":e==="REJECTED"?"badge-rej":"badge-par"; }
function verdictClass(e){ return e==="APPROVED"?"verdict-ok":e==="REJECTED"?"verdict-rej":"verdict-par"; }
function bigVerdictClass(e){ return e==="APPROVED"?"verdict-ok":e==="REJECTED"?"verdict-rej":"verdict-par"; }
function liClass(d){ return d==="APPROVED"?"ok":d==="REJECTED"?"rej":"par"; }
function apprClass(ld){ return ld.approved===ld.billed?"green":ld.approved===0?"red":"amber"; }
function confColor(p){ return p>=90?"var(--green)":p>=75?"var(--amber)":"var(--red)"; }
function fraudClass(lv){ return lv.toLowerCase(); }
function fraudScoreClass(lv){ return "fraud-card "+fraudClass(lv); }
function sigTagClass(sev){ return "sig-tag "+sev.toLowerCase(); }

var selectedBill = null;
var PIPE_STAGES = [["📄","Input"],["👁","Vision"],["📋","Policy"],["⚖️","Rules"],["✅","Output"]];

function buildPipeline(active) {
  return PIPE_STAGES.map(function(s,i){
    var cls = active===-1?"idle":i<active?"done":i===active?"active":"idle";
    var arrow = i<PIPE_STAGES.length-1?'<span class="pipe-arrow">›</span>':"";
    return '<div class="pipe-step '+cls+'"><span class="pipe-icon">'+s[0]+'</span><span class="pipe-label">'+s[1]+'</span></div>'+arrow;
  }).join("");
}

// ─── Bill List ──────────────────────────────────────────────────────────────
function renderList() {
  var html = BILLS.map(function(b){
    var cls = selectedBill&&selectedBill.id===b.id?" active":"";
    return '<div class="bill-item'+cls+'" onclick="selectBill(\''+b.id+'\')">'+
      '<div class="bi-top">'+
        '<div class="bi-name">'+b.name+'</div>'+
        '<div class="bi-amt">'+inr(b.total)+'</div>'+
      '</div>'+
      '<div class="bi-diag">'+b.patient+' · '+b.age+' yrs · '+b.hospital+'</div>'+
      '<div class="bi-bottom">'+
        '<div class="bi-id">'+b.id+'</div>'+
        '<span class="badge '+badgeClass(b.expected)+'">'+b.expected+'</span>'+
      '</div>'+
    '</div>';
  }).join("");
  document.getElementById("bill-list").innerHTML = html;
}

function selectBill(id) {
  selectedBill = BILLS.find(function(b){return b.id===id;});
  renderList();
  var btn = document.getElementById("run-btn");
  btn.disabled = false;
  document.getElementById("btn-label").textContent = "Run claim engine";
  document.getElementById("btn-icon").innerHTML = '<path d="M5 3l6 4-6 4V3z" fill="currentColor"/>';
  document.getElementById("right-content").innerHTML =
    '<div class="right-inner"><div class="empty-state">'+
    '<div class="empty-icon">📋</div>'+
    '<div class="empty-title">'+selectedBill.name+'</div>'+
    '<div class="empty-sub">'+selectedBill.patient+' · '+selectedBill.hospital+
    '<br><br>Click <strong>Run claim engine</strong> to adjudicate this claim.</div>'+
    '</div></div>';
}

// ─── Engine Run ──────────────────────────────────────────────────────────────
async function runEngine() {
  if (!selectedBill) return;
  var btn  = document.getElementById("run-btn");
  var icon = document.getElementById("btn-icon");
  var lbl  = document.getElementById("btn-label");
  btn.disabled = true;
  btn.classList.add("running");
  icon.innerHTML='<circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5" stroke-dasharray="8 6" fill="none"/>';
  lbl.textContent = "Processing…";

  // Animate pipeline
  document.getElementById("right-content").innerHTML=
    '<div class="right-inner">'+
    '<div class="pipeline" id="pipe">'+buildPipeline(-1)+'</div>'+
    '<div class="empty-state" style="min-height:60vh">'+
    '<div class="empty-icon" style="animation:blink2 .8s infinite">⚙️</div>'+
    '<div class="empty-title">Adjudicating claim…</div>'+
    '<div class="empty-sub">Running 13 priority rules against the policy clause index.</div>'+
    '</div></div>';
  var style=document.createElement("style");
  style.textContent="@keyframes blink2{0%,100%{opacity:1}50%{opacity:.3}}";
  document.head.appendChild(style);

  for (var s=0;s<=4;s++) {
    await sleep(220);
    var pipe=document.getElementById("pipe");
    if(pipe) pipe.innerHTML=buildPipeline(s);
  }
  await sleep(150);

  var t0=performance.now();
  var result = evaluate(selectedBill);
  var fr     = fraud(selectedBill, result);
  var ms     = Math.round(performance.now()-t0);

  btn.classList.remove("running");
  btn.disabled=false;
  icon.innerHTML='<path d="M5 3l6 4-6 4V3z" fill="currentColor"/>';
  lbl.textContent="Re-run";

  renderResult(result, fr, ms);
}

function sleep(ms){ return new Promise(function(r){setTimeout(r,ms);}); }

// ─── Result Render ───────────────────────────────────────────────────────────
function renderResult(r, fr, ms) {
  var b = selectedBill;
  var vc = verdictClass(r.overall);
  var cc = confColor(r.conf);

  var html = '<div class="right-inner">';

  // Pipeline (done)
  html += '<div class="pipeline">'+buildPipeline(5)+'</div>';

  // Header
  html += '<div class="decision-top">'+
    '<div>'+
      '<div class="decision-patient">'+b.patient+'</div>'+
      '<div class="decision-meta">'+b.hospital+' &nbsp;·&nbsp; '+b.id+'</div>'+
    '</div>'+
    '<span class="verdict-badge '+vc+'">'+r.overall+'</span>'+
  '</div>';

  // Financial cards
  var cols = r.copay>0?5:4;
  var coCard = r.copay>0?'<div class="fin-card"><div class="fin-lbl">Co-payment</div><div class="fin-val amber">'+inr(r.copay)+'</div></div>':"";
  html += '<div class="fin-row" style="grid-template-columns:repeat('+cols+',1fr)">'+
    '<div class="fin-card"><div class="fin-lbl">Total Billed</div><div class="fin-val">'+inr(r.billed)+'</div></div>'+
    '<div class="fin-card"><div class="fin-lbl">Approved</div><div class="fin-val green">'+inr(r.approved)+'</div></div>'+
    '<div class="fin-card"><div class="fin-lbl">Rejected</div><div class="fin-val red">'+inr(r.rejected)+'</div></div>'+
    coCard+
    '<div class="fin-card"><div class="fin-lbl">Net Payable</div><div class="fin-val blue">'+inr(r.net)+'</div></div>'+
  '</div>';

  // Confidence
  var noteLabel=r.human
    ?'<span class="conf-note review">⚠ Human review flagged</span>'
    :'<span class="conf-note normal">Auto-settled</span>';
  html += '<div class="conf-strip">'+
    '<span class="conf-lbl">Engine confidence</span>'+
    '<div class="conf-track"><div class="conf-fill" style="width:'+r.conf+'%;background:'+cc+'"></div></div>'+
    '<span class="conf-pct" style="color:'+cc+'">'+r.conf+'%</span>'+
    noteLabel+
  '</div>';

  // Notes
  if (r.notes.length) {
    html += '<div class="notes">';
    r.notes.forEach(function(n){ html+='<div class="note-item">'+n+'</div>'; });
    html += '</div>';
  }

  // Block banner
  if (r.blocking) {
    html += '<div class="block-banner">'+
      '<div class="block-icon">🚫</div>'+
      '<div><div class="block-msg">'+r.blocking+'</div>'+
      '<div class="block-cite">'+cite(r.bcite)+'</div></div>'+
    '</div>';
  }

  // Line items
  html += '<div class="sec-lbl">Line item breakdown</div>'+
    '<div class="li-wrap">'+
    '<div class="li-head"><span>Description</span><span>Billed</span><span>Approved</span><span>Status</span></div>';

  r.decisions.forEach(function(ld){
    var rc=liClass(ld.dec), ac=apprClass(ld), bc=badgeClass(ld.dec);
    var re=ld.reason&&ld.dec!=="APPROVED"?'<div class="li-reason">'+ld.reason+'</div>':"";
    var ci=ld.rcite&&ld.dec!=="APPROVED"?'<div class="li-cite">'+cite(ld.rcite)+'</div>':"";
    html += '<div class="li-row '+rc+'">'+
      '<div><div class="li-desc">'+ld.d+'</div>'+re+ci+'</div>'+
      '<div class="li-billed">'+inr(ld.billed)+'</div>'+
      '<div class="li-appr '+ac+'">'+inr(ld.approved)+'</div>'+
      '<div class="li-status"><span class="badge '+bc+'">'+ld.dec+'</span></div>'+
    '</div>';
  });
  html += '</div>'; // li-wrap

  // Fraud + Citations side by side
  html += '<div class="bottom-grid">';

  // Fraud
  var fcls = fr.level.toLowerCase();
  var fscls = fr.level.toLowerCase();
  var sigsHtml = fr.signals.length===0
    ? '<div class="fraud-empty">No fraud signals detected.</div>'
    : fr.signals.map(function(s){
        return '<div class="sig-row"><span class="sig-tag '+s.sev+'">'+s.sev+'</span><span>'+s.desc+'</span></div>';
      }).join("");
  html += '<div>'+
    '<div class="sec-lbl">Fraud analysis</div>'+
    '<div class="fraud-card '+fcls+'">'+
      '<div class="fraud-head">'+
        '<span class="fraud-title">Risk level: '+fr.level+'</span>'+
        '<span class="fraud-score">'+fr.score+'/100</span>'+
      '</div>'+sigsHtml+
    '</div></div>';

  // Citations
  html += '<div>'+
    '<div class="sec-lbl">Policy citations</div>'+
    '<div class="cite-list">'+
    r.cites.map(function(id,i){
      return '<div class="cite-item"><span class="cite-n">['+(i+1)+']</span><span>'+cite(id)+'</span></div>';
    }).join("")+
    '</div></div>';

  html += '</div>'; // bottom-grid

  // Timing
  html += '<div class="timing"><div class="timing-dot"></div>Adjudicated in '+ms+'ms · Rule engine v2 · Gemini 2.0 Flash Vision</div>';

  html += '</div>'; // right-inner
  document.getElementById("right-content").innerHTML = html;
}

// ─── Init ────────────────────────────────────────────────────────────────────
renderList();
</script>
